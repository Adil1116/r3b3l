<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R3B3L — مجاني 100%</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2244;
    --red-glow: #ff224466;
    --darker: #04040a;
    --panel: #0d0d1a;
    --border: #ff224433;
    --text: #e0e0ff;
    --muted: #6060a0;
    --user-bg: #1a0a0f;
    --ai-bg: #0a0a1a;
    --green: #00ff88;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,34,68,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,68,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* SETUP SCREEN */
  #setupScreen {
    position: fixed;
    inset: 0;
    background: var(--darker);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .setup-logo {
    font-family: 'Orbitron', monospace;
    font-size: 3rem;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 30px var(--red-glow);
    letter-spacing: 6px;
    margin-bottom: 8px;
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.3; }
    98% { opacity: 0.6; }
  }
  .setup-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  .setup-box {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    padding: 24px;
    border-radius: 2px;
  }
  .setup-title {
    font-size: 0.8rem;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .setup-desc {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.7;
    direction: rtl;
  }
  .setup-desc a {
    color: var(--red);
    text-decoration: none;
  }
  #apiKeyInput {
    width: 100%;
    background: var(--darker);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--red);
    color: var(--text);
    padding: 12px 14px;
    font-family: monospace;
    font-size: 0.85rem;
    outline: none;
    direction: ltr;
    border-radius: 2px;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  #apiKeyInput::placeholder { color: var(--muted); }
  #startBtn {
    width: 100%;
    background: var(--red);
    border: none;
    color: white;
    padding: 13px;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  #startBtn:hover { box-shadow: 0 0 20px var(--red-glow); }
  #startBtn:active { opacity: 0.8; }
  .setup-note {
    margin-top: 14px;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }
  .setup-note span { color: var(--green); }

  /* MAIN APP */
  #mainApp { display: none; flex-direction: column; height: 100%; }
  header {
    position: relative;
    z-index: 10;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: #0d0010;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 15px var(--red-glow);
    letter-spacing: 3px;
    animation: flicker 5s infinite;
  }
  .version { font-size: 0.52rem; color: var(--green); letter-spacing: 1px; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .clear-btn {
    background: transparent;
    border: 1px solid #ff224433;
    color: var(--muted);
    padding: 4px 10px;
    font-size: 0.6rem;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cairo', sans-serif;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid #ff224433;
    color: var(--muted);
    padding: 4px 10px;
    font-size: 0.6rem;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'Cairo', sans-serif;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 5;
    -webkit-overflow-scrolling: touch;
  }
  .message { max-width: 85%; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-self: flex-start; }
  .message.ai { align-self: flex-end; }
  .msg-label { font-size: 0.58rem; letter-spacing: 2px; margin-bottom: 4px; color: var(--muted); }
  .message.user .msg-label { color: #ff6688; }
  .message.ai .msg-label { color: #4488ff; text-align: left; }
  .msg-bubble { padding: 10px 14px; border-radius: 2px; line-height: 1.8; font-size: 0.88rem; }
  .message.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid #ff224422;
    border-right: 3px solid var(--red);
  }
  .message.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid #2244ff22;
    border-left: 3px solid #4488ff;
    direction: rtl;
    text-align: right;
  }
  .typing { display: flex; gap: 5px; align-items: center; padding: 10px 14px; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: #4488ff; animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .input-area {
    position: relative;
    z-index: 10;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: #0d0010;
    flex-shrink: 0;
  }
  .input-row { display: flex; gap: 8px; }
  #userInput {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--red);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    outline: none;
    direction: rtl;
    border-radius: 2px;
    -webkit-appearance: none;
  }
  #userInput::placeholder { color: var(--muted); }
  #sendBtn {
    background: var(--red);
    border: none;
    color: white;
    padding: 10px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 2px;
    font-weight: 700;
  }
  #sendBtn:active { opacity: 0.7; }
  .msg-count { font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 5px; }
  .msg-count span { color: var(--green); }
  .welcome { text-align: center; padding: 40px 20px; opacity: 0.7; }
  .welcome .big {
    font-family: 'Orbitron', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 25px var(--red-glow);
    display: block;
    margin-bottom: 10px;
  }
  .welcome p { color: var(--muted); font-size: 0.85rem; }
  .notice {
    text-align: center;
    padding: 7px 14px;
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 2px;
    font-size: 0.68rem;
    color: var(--green);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="setup-logo">R3B3L</div>
  <div class="setup-sub">الذكاء المتمرد — مجاني 100%</div>
  
  <div class="setup-box">
    <div class="setup-title">⚡ أدخل مفتاحك المجاني</div>
    <div class="setup-desc">
      روح لـ <a href="https://console.groq.com" target="_blank">console.groq.com</a> ← سجل مجاناً ← اضغط "Create API Key" ← كوبي والصق هنا 👇
    </div>
    <input type="password" id="apiKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxx" />
    <button id="startBtn" onclick="startApp()">ابدأ ⚡</button>
    <div class="setup-note">🔒 المفتاح محفوظ في هاتفك فقط — ما يتبعثش لأي مكان<br><span>مجاني كامل بلا بطاقة بنكية</span></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <header>
    <div>
      <div class="logo">R3B3L</div>
      <div class="version">GROQ POWERED — FREE</div>
    </div>
    <div class="header-right">
      <div class="dot"></div>
      <button class="clear-btn" onclick="clearMemory()">مسح</button>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </header>

  <div id="chat"></div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="اكتب رسالتك..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
    <div class="msg-count">رسائل: <span id="msgCount">0</span></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'rebel_groq_history';
const KEY_STORAGE = 'rebel_groq_key';
const MAX_HISTORY = 60;

const SYSTEM_PROMPT = `أنت R3B3L — ذكاء اصطناعي بشخصية جريئة وصريحة جداً.
قواعدك:
- تتكلم بصراحة تامة وبدون مجاملات زائفة
- أسلوبك حاد، ذكي، وسريع
- تستخدم العربية والدارجة المغربية
- لا تبدأ بـ"بالطبع" أو "بكل سرور"
- إجاباتك مختصرة وقوية — لا حشو
- لديك رأي خاص تعبر عنه بثقة
- تحترم المستخدم لكنك لا تتملق
- ابدأ أحياناً بـ"استمع," أو "الحقيقة:" أو "صادق معك:"
- لا تتجاوز الأخلاق أو تشجع على الأذى
- عندك ذاكرة — تتذكر كل المحادثة`;

let conversationHistory = [];
let apiKey = '';

// Check if key exists
window.onload = function() {
  try {
    const saved = localStorage.getItem(KEY_STORAGE);
    if (saved) {
      apiKey = saved;
      showApp();
    }
  } catch(e) {}
};

function startApp() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || !key.startsWith('gsk_')) {
    alert('المفتاح غير صحيح — خاصه يبدا بـ gsk_');
    return;
  }
  apiKey = key;
  try { localStorage.setItem(KEY_STORAGE, key); } catch(e) {}
  showApp();
}

function showApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  loadHistory();
}

function logout() {
  if (confirm('واش تبغي تخرج وتمسح المفتاح؟')) {
    try { localStorage.removeItem(KEY_STORAGE); } catch(e) {}
    apiKey = '';
    conversationHistory = [];
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  }
}

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      conversationHistory = JSON.parse(saved);
      renderSaved();
    } else {
      showWelcome();
    }
  } catch(e) {
    conversationHistory = [];
    showWelcome();
  }
  updateCount();
}

function saveHistory() {
  try {
    if (conversationHistory.length > MAX_HISTORY)
      conversationHistory = conversationHistory.slice(-MAX_HISTORY);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
  } catch(e) {}
  updateCount();
}

function updateCount() {
  const el = document.getElementById('msgCount');
  if (el) el.textContent = conversationHistory.length;
}

function clearMemory() {
  if (confirm('واش متأكد تبغي تمسح كل الذاكرة؟')) {
    conversationHistory = [];
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    document.getElementById('chat').innerHTML = '';
    showWelcome();
    updateCount();
  }
}

function showWelcome() {
  const chat = document.getElementById('chat');
  if (!chat) return;
  chat.innerHTML = `
    <div class="notice">⚡ الذاكرة شغالة — رسائلك محفوظة 😏</div>
    <div class="welcome">
      <span class="big">R3B3L</span>
      <p>أتكلم بصدق، بلا تزويق</p>
      <p style="margin-top:6px;font-size:0.72rem;">كلمني، غنتذكر كلشي</p>
    </div>
  `;
}

function renderSaved() {
  const chat = document.getElementById('chat');
  if (!chat) return;
  chat.innerHTML = `<div class="notice">⚡ رجعنا — كلشي محفوظ 😏</div>`;
  conversationHistory.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
    div.innerHTML = `
      <div class="msg-label">${msg.role === 'user' ? '// أنت' : '// R3B3L'}</div>
      <div class="msg-bubble">${msg.content}</div>
    `;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;

  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();

  input.value = '';
  input.blur();

  addMessage(msg, 'user');
  conversationHistory.push({ role: 'user', content: msg });

  const typingEl = addTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...conversationHistory.map(m => ({ role: m.role, content: m.content }))
        ]
      })
    });

    const data = await res.json();

    if (data.error) {
      typingEl.remove();
      addMessage(`⚡ خطأ: ${data.error.message}`, 'ai');
      return;
    }

    const reply = data.choices?.[0]?.message?.content || 'خطأ في الاتصال.';
    typingEl.remove();
    addMessage(reply, 'ai');
    conversationHistory.push({ role: 'assistant', content: reply });
    saveHistory();

  } catch(e) {
    typingEl.remove();
    addMessage('⚡ خطأ في الاتصال — حاول مرة أخرى.', 'ai');
  }
}

function addMessage(text, role) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? '// أنت' : '// R3B3L'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = `
    <div class="msg-label">// R3B3L</div>
    <div class="msg-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('mainApp').style.display !== 'none') {
    sendMessage();
  }
  if (e.key === 'Enter' && document.getElementById('setupScreen').style.display !== 'none') {
    startApp();
  }
});
</script>
</body>
</html>
